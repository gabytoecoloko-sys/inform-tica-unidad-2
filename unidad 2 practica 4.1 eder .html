<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        main {
            width: 200px;
            height: 100px;
            padding: 20px;
            border: 5px solid black;
            border-top: dashed black;
            border-left: 10px dotted blue;
            margin: 30px;
        }
        p{
            width: 200px;
            height: 100px;
            padding: 30px;
            border: 5px dotted black;
            border-top: dashed red;
            border-right: 10px dotted blue;
            margin: 35px;
        }
        /* Ejemplo de modelo de caja completo */
.caja {
    /* Dimensiones del contenido */
    width: 200px;
    height: 100px;
    
    /* Relleno */
    padding: 20px;
    
    /* Borde */
    border: 10px solid #64b5f6;
    
    /* Margen */
    margin: 20px;
    
    /* Fondo para visualizar mejor */
    background-color: #bbdefb;
}

    </style>
</head>
<body>
    <main> 
        <h1>modelo de caja</h1>
    </main>
    <p>
        <h2>segundo elemento</h2>
    </p>
</body>
</html>
